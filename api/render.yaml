services:
  - type: web
    name: gridwatch-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GRIDWATCH_DATA_DIR
        value: data
    autoDeploy: true
